# configs/stage3_multijoint.yaml — Stage 3 multi-joint ablation.
#
# Same recipe as stage3.yaml EXCEPT the pool concatenates 5 fingertip
# bell-pools (THUMB / INDEX / MIDDLE / RING / PINKY) per frame.  With
# temporal context this lands at 5*384*3 + 1 = 5761 input dims, which the
# Conformer's first Linear projects back down to 256.  Run AFTER the
# headline Stage 3 sweep completes; reuses the same locked optimiser /
# scheduler / augmentation so the multi-joint contribution is the only
# moving variable.

encoder:
  name:                  facebook/dinov2-small
  image_size:            336
  pool:                  fingertip_3x3_bell
  bell_sigma:            1.0
  temporal_context:      true
  visibility_gate:       true
  multi_joint:           true       # the only delta vs stage3.yaml

feature_cache:
  T_native:              32
  padding_ratio:         0.3
  seg_chunk:             16
  dtype:                 float16
  # out_dim = 5 * 384 * 3 + 1 = 5761

model:
  arch:                  ConformerCTC
  d_model:               256
  n_layers:              4
  n_heads:               4
  conv_kernel:           15
  ff_mult:               4
  dropout:               0.2
  upsample:              2
  input_layernorm:       true

training:
  num_epochs:            80
  batch_size:            32
  optimizer:             AdamW
  lr_peak:               5.0e-4
  weight_decay:          5.0e-2
  betas:                 [0.9, 0.999]
  grad_clip:             1.0
  scheduler:             OneCycleLR
  warmup_pct:            0.05
  anneal_strategy:       cos
  seed:                  42
  ctc_zero_infinity:     true

augmentation:
  p_temporal_warp:       0.80
  temporal_warp_max:     0.15
  p_spatial_jitter:      0.0
  spatial_sigma:         0.0
  p_temporal_crop:       0.50
  temporal_crop_min:     0.60
  temporal_crop_max:     1.00

cv:
  manifest:              manifests/subject_cv5.json
  n_folds:               5
  seed:                  42

pass_fail:
  train_nll_must_drop_below: 0.5
  headline_val_cer_max:      0.860
  stretch_val_cer_max:       0.78
